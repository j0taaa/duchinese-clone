services:
  db:
    image: postgres:16
    container_name: hanzilane-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hanzilane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hanzilane"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hanzilane-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hanzilane?schema=public
      BETTER_AUTH_SECRET: docker-dev-secret-change-me
      BETTER_AUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
